<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f18"/>
      <stop offset="1" stop-color="#141b2e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset=".55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <rect x="2" y="2" width="124" height="124" rx="22" fill="none" stroke="#243049" stroke-width="2"/>
  <g filter="url(#glow)">
    <circle cx="64" cy="64" r="33" fill="none" stroke="url(#ring)" stroke-width="7"/>
    <line x1="64" y1="16" x2="64" y2="42" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
    <line x1="64" y1="86" x2="64" y2="112" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
    <line x1="16" y1="64" x2="42" y2="64" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
    <line x1="86" y1="64" x2="112" y2="64" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
    <circle cx="64" cy="64" r="8" fill="#ff5340"/>
    <circle cx="61.5" cy="61.5" r="2.6" fill="#ffb4ab"/>
  </g>
</svg>
